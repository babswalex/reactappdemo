name: Deploy Reliance Todo

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - staging
          - production
        default: 'dev'
      azure_resource_group:
        description: 'Azure Resource Group name'
        required: true
        type: string
        default: 'rg-reliance-todo-dev'
      azure_app_service_name:
        description: 'Azure App Service name'
        required: true
        type: string
        default: 'reliance-todo-dev'
      run_tests:
        description: 'Run tests'
        required: false
        type: boolean
        default: true
      run_linting:
        description: 'Run linting'
        required: false
        type: boolean
        default: true
      run_security_scan:
        description: 'Run security scan (CodeQL)'
        required: false
        type: boolean
        default: false
      build_docker:
        description: 'Build and push Docker image to ACR'
        required: false
        type: boolean
        default: false
      deploy_to_staging:
        description: 'Deploy to staging environment'
        required: false
        type: boolean
        default: false
      deploy_to_production:
        description: 'Deploy to production environment'
        required: false
        type: boolean
        default: false
      notify_on_failure:
        description: 'Send Slack notification on failure'
        required: false
        type: boolean
        default: true
      node_version:
        description: 'Node.js version'
        required: false
        type: string
        default: '20.x'

env:
  NODE_VERSION: ${{ github.event.inputs.node_version }}
  BUILD_PATH: './build'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ github.event.inputs.node_version }}
          cache: 'npm'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        if: ${{ github.event.inputs.run_linting == 'true' }}
        run: npm run lint

      - name: Run tests
        if: ${{ github.event.inputs.run_tests == 'true' }}
        run: npm test -- --coverage --watchAll=false
        env:
          CI: true

      - name: Build React app
        run: npm run build
        env:
          CI: true
          REACT_APP_ENV: ${{ github.event.inputs.environment }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: reliance-todo-build
          path: ${{ env.BUILD_PATH }}

  security-scan:
    name: Security Scan
    needs: build
    if: ${{ github.event.inputs.run_security_scan == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"

  build-docker:
    name: Build & Push Docker Image
    needs: build
    if: ${{ github.event.inputs.build_docker == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: reliance-todo-build
          path: ${{ env.BUILD_PATH }}

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}/reliance-todo:${{ github.sha }}
            ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}/reliance-todo:latest

  deploy-staging:
    name: Deploy to Staging
    needs: [build, security-scan, build-docker]
    if: |
      always() &&
      needs.build.result == 'success' &&
      (needs.security-scan.result == 'success' || needs.security-scan.result == 'skipped') &&
      (needs.build-docker.result == 'success' || needs.build-docker.result == 'skipped') &&
      github.event.inputs.deploy_to_staging == 'true'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: reliance-todo-build
          path: ${{ env.BUILD_PATH }}

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure App Service (Staging)
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ github.event.inputs.azure_app_service_name }}-staging
          resource-group-name: ${{ github.event.inputs.azure_resource_group }}
          package: ${{ env.BUILD_PATH }}
          slot-name: staging

      - name: Azure logout
        run: az logout
        if: always()

  deploy-production:
    name: Deploy to Production
    needs: [build, security-scan, build-docker, deploy-staging]
    if: |
      always() &&
      needs.build.result == 'success' &&
      (needs.security-scan.result == 'success' || needs.security-scan.result == 'skipped') &&
      (needs.build-docker.result == 'success' || needs.build-docker.result == 'skipped') &&
      (needs.deploy-staging.result == 'success' || needs.deploy-staging.result == 'skipped') &&
      github.event.inputs.deploy_to_production == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: reliance-todo-build
          path: ${{ env.BUILD_PATH }}

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure App Service (Production)
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ github.event.inputs.azure_app_service_name }}
          resource-group-name: ${{ github.event.inputs.azure_resource_group }}
          package: ${{ env.BUILD_PATH }}

      - name: Azure logout
        run: az logout
        if: always()

  notify-on-failure:
    name: Notify on Failure
    needs: [build, security-scan, build-docker, deploy-staging, deploy-production]
    if: |
      failure() &&
      github.event.inputs.notify_on_failure == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack Notification
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "❌ Reliance Todo Deployment Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "❌ *Reliance Todo Deployment Failed*\n\n*Environment:* ${{ github.event.inputs.environment }}\n*Branch:* ${{ github.ref_name }}\n*Triggered by:* ${{ github.actor }}\n*Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Workflow>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
